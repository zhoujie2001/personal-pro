<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐播放器 - 三个卡片并列 + 浮动效果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* 三个卡片容器 */
        .cards-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        /* 卡片样式 */
        .card {
            flex: 1;
            min-width: 300px;
            max-width: 400px;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* 卡片浮动动画 */
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .card-float {
            animation: float 3s ease-in-out infinite;
        }

        .card:nth-child(2) {
            animation-delay: 0.5s;
        }

        .card:nth-child(3) {
            animation-delay: 1s;
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #667eea;
        }

        .card h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .card p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* 歌单内容 */
        .playlist-songs {
            width: 100%;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .song-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            text-align: left;
        }

        .song-item:last-child {
            border-bottom: none;
        }

        .song-cover {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .song-info {
            flex: 1;
            min-width: 0;
        }

        .song-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            font-size: 12px;
            color: #666;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-album {
            font-size: 11px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-top: auto;
            text-decoration: none;
            display: inline-block;
        }

        .card-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .cards-container {
                flex-direction: column;
                align-items: center;
            }
            
            .card {
                min-height: auto;
                width: 100%;
                max-width: 400px;
            }
        }

        .status {
            text-align: center;
            margin-top: 20px;
            color: white;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .back-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 音乐播放器</h1>
            <p>三个歌单卡片并列 + 浮动动画效果 | 每次刷新随机显示5首歌</p>
            <a href="/personal-pro/" class="back-link">
                <i class="fas fa-arrow-left"></i> 返回主项目
            </a>
        </div>

        <!-- 三个并列卡片 -->
        <div class="cards-container">
            <!-- 第一个歌单卡片 -->
            <div class="card card-float">
                <div class="card-icon">
                    <i class="fas fa-sun"></i>
                </div>
                <h3>光和枯树</h3>
                <p>温暖的光与静谧的树，适合安静思考的时光</p>
                
                <div class="playlist-songs" id="playlist1">
                    <!-- 歌曲将通过JavaScript动态生成 -->
                </div>
                
                <a href="https://y.qq.com/n3/other/pages/details/playlist.html?hosteuin=oK6soKoqNenP7z**&id=8670100374&appversion=200105&ADTAG=wxfshare&appshare=iphone_wx&redirecttag=mn.error.getInitialProps.timeout&mnst=502.28" 
                   target="_blank" class="card-btn">
                    查看完整歌单
                </a>
            </div>
            
            <!-- 第二个歌单卡片 -->
            <div class="card card-float">
                <div class="card-icon">
                    <i class="fas fa-cloud-rain"></i>
                </div>
                <h3>雨和屋檐</h3>
                <p>雨声与屋檐的对话，适合雨天聆听的旋律</p>
                
                <div class="playlist-songs" id="playlist2">
                    <!-- 歌曲将通过JavaScript动态生成 -->
                </div>
                
                <a href="https://i2.y.qq.com/n3/other/pages/details/playlist.html?hosteuin=oK6soKoqNenP7z**&id=8667064202&appversion=200105&ADTAG=wxfshare&appshare=iphone_wx" 
                   target="_blank" class="card-btn">
                    查看完整歌单
                </a>
            </div>
            
            <!-- 第三个歌单卡片 -->
            <div class="card card-float">
                <div class="card-icon">
                    <i class="fas fa-wind"></i>
                </div>
                <h3>风和草地</h3>
                <p>风与草地的交响，适合户外漫步的节奏</p>
                
                <div class="playlist-songs" id="playlist3">
                    <!-- 歌曲将通过JavaScript动态生成 -->
                </div>
                
                <a href="https://i2.y.qq.com/n3/other/pages/details/playlist.html?hosteuin=oK6soKoqNenP7z**&id=8667059995&appversion=200105&ADTAG=wxfshare&appshare=iphone_wx" 
                   target="_blank" class="card-btn">
                    查看完整歌单
                </a>
            </div>
        </div>

        <div class="status">
            页面已加载 | 三个卡片并列显示 ✅ | 卡片浮动动画 ✅ | 随机歌曲显示 ✅
        </div>
    </div>

    <script>
        // 歌单数据
        const playlists = [
            {
                id: 1,
                name: "光和枯树",
                songs: [
                    { id: 1, title: "光", artist: "陈粒", album: "如也" },
                    { id: 2, title: "枯树", artist: "房东的猫", album: "柔软" },
                    { id: 3, title: "树洞", artist: "许嵩", album: "青年晚报" },
                    { id: 4, title: "光年之外", artist: "G.E.M.邓紫棋", album: "新的心跳" },
                    { id: 5, title: "枯木逢春", artist: "枯木逢春", album: "亦是此间少年" },
                    { id: 6, title: "追光者", artist: "岑宁儿", album: "夏至未至" },
                    { id: 7, title: "光之翼", artist: "王菲", album: "光之翼" },
                    { id: 8, title: "树读", artist: "王俊凯", album: "树读" },
                    { id: 9, title: "光合作用", artist: "房东的猫", album: "柔软" },
                    { id: 10, title: "光晕", artist: "周深", album: "深的深" }
                ]
            },
            {
                id: 2,
                name: "雨和屋檐",
                songs: [
                    { id: 1, title: "雨爱", artist: "杨丞琳", album: "Rainie & Love...?" },
                    { id: 2, title: "屋檐", artist: "周杰伦", album: "七里香" },
                    { id: 3, title: "下雨天", artist: "南拳妈妈", album: "优の良曲 南搞小孩" },
                    { id: 4, title: "雨下一整晚", artist: "周杰伦", album: "跨时代" },
                    { id: 5, title: "屋檐下的思念", artist: "汪苏泷", album: "传世乐章" },
                    { id: 6, title: "雨天", artist: "孙燕姿", album: "My Story, Your Song" },
                    { id: 7, title: "雨一直下", artist: "张宇", album: "雨一直下" },
                    { id: 8, title: "六月的雨", artist: "胡歌", album: "仙剑奇侠传" },
                    { id: 9, title: "听见下雨的声音", artist: "周杰伦", album: "哎呦，不错哦" },
                    { id: 10, title: "雨蝶", artist: "李翊君", album: "还珠格格" }
                ]
            },
            {
                id: 3,
                name: "风和草地",
                songs: [
                    { id: 1, title: "风", artist: "张杰", album: "爱，不解释" },
                    { id: 2, title: "风吹麦浪", artist: "李健", album: "想念你" },
                    { id: 3, title: "草", artist: "陈奕迅", album: "上五楼的快活" },
                    { id: 4, title: "风中有朵雨做的云", artist: "孟庭苇", album: "风中有朵雨做的云" },
                    { id: 5, title: "草原之夜", artist: "刀郎", album: "2002年的第一场雪" },
                    { id: 6, title: "风继续吹", artist: "张国荣", album: "风继续吹" },
                    { id: 7, title: "野子", artist: "苏运莹", album: "野子" },
                    { id: 8, title: "风吹草动", artist: "林志炫", album: "散了吧" },
                    { id: 9, title: "风之彩", artist: "范晓萱", album: "小魔女的魔法书" },
                    { id: 10, title: "草原上升起不落的太阳", artist: "吴雁泽", album: "经典民歌" }
                ]
            }
        ];

        // 随机选择5首歌曲
        function getRandomSongs(songs, count = 5) {
            const shuffled = [...songs].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count);
        }

        // 生成歌曲封面颜色
        function getCoverColor(index) {
            const colors = [
                'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
                'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
                'linear-gradient(135deg, #fa709a 0%, #fee140 100%)'
            ];
            return colors[index % colors.length];
        }

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            // 为每个卡片添加浮动动画
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                card.classList.add('card-float');
            });
            
            // 为每个歌单生成随机歌曲
            playlists.forEach((playlist, index) => {
                const container = document.getElementById(`playlist${playlist.id}`);
                const randomSongs = getRandomSongs(playlist.songs, 5);
                
                randomSongs.forEach((song, songIndex) => {
                    const songItem = document.createElement('div');
                    songItem.className = 'song-item';
                    
                    songItem.innerHTML = `
                        <div class="song-cover" style="background: ${getCoverColor(songIndex)};">
                            <i class="fas fa-music"></i>
                        </div>
                        <div class="song-info">
                            <div class="song-title">${song.title}</div>
                            <div class="song-artist">${song.artist}</div>
                            <div class="song-album">${song.album}</div>
                        </div>
                    `;
                    
                    container.appendChild(songItem);
                });
            });
            
            // 卡片悬停效果
            cards.forEach(card => {
                card.addEventListener('mouseenter', function() {
                    this.style.animationPlayState = 'paused';
                    this.style.transform = 'translateY(-10px)';
                });
                
                card.addEventListener('mouseleave', function() {
                    this.style.animationPlayState = 'running';
                    this.style.transform = 'translateY(0)';
                });
            });
            
            // 按钮点击效果
            const buttons = document.querySelectorAll('.card-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    this.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        this.style.transform = 'scale(1.05)';
                    }, 150);
                });
            });
        });
    </script>
</body>
</html>
